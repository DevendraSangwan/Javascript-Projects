<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="04_style.css">
</head>
<body>

<div class="container">
    <h1>🎯 Number Guessing Game</h1>
    <p>Guess a number between <strong>1 and 100</strong></p>
    <input
        type="number"
        id="guess"
        placeholder="Enter your guess">
    <button id="guessBtn">
        Check Guess
    </button>
    <button id="resetBtn">
        Reset Game
    </button>
    <div id="result"></div>
</div>

<script src="04_script.js"></script>

</body>
</html>
