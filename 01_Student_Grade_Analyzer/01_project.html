<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Analyzer</title>
    <link rel="stylesheet" href="01_style.css">
</head>
<body>

<div class="container">
    <h1>🎓 Student Grade Analyzer</h1>
    <p class="para">Enter Student Marks (comma separated)</p>
    <input
        type="text"
        id="marks"
        placeholder="Example: 85,92,78,90,88">
    <button id="analyzeBtn">
        Analyze
    </button>
    <div id="output"></div>
</div>

<script src="01_script.js"></script>
</body>
</html>
