<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card System</title>
    <link rel="stylesheet" href="05_style.css">
</head>
<body>

<div class="container">
    <h1>📚 Student Report Card System</h1>
    <input type="text" id="studentName" placeholder="Enter Student Name">
    <input type="number" id="math" placeholder="Math Marks">
    <input type="number" id="science" placeholder="Science Marks">
    <input type="number" id="english" placeholder="English Marks">
    <input type="number" id="computer" placeholder="Computer Marks">
    <input type="number" id="hindi" placeholder="Hindi Marks">
    <button id="generateBtn">Generate Report Card</button>
    <div id="output"></div>
</div>

<script src="05_script.js"></script>

</body>
</html>
